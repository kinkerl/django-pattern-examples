version: '3.8'
x-app-base: &app-base
  build: .
  volumes:
    - .:/app
  environment:
    DATABASE_URL: postgres://postgres:postgres@db:5432/postgres
  depends_on:
    db:
      condition: service_started

services:
  web:
    <<: *app-base
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"

  pytest:
    <<: *app-base
    command: pytest

  lint:
    <<: *app-base
    command: ruff format /app
    depends_on: []   # lint doesn't need the database

  db:
    image: postgres:14
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust

volumes:
  postgres_data: